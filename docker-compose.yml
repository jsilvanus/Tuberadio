services:
  # ---------------------------------------------------------------------------
  # nginx-rtmp  — RTMP ingestion + HLS / archive HTTP serving
  # ---------------------------------------------------------------------------
  nginx:
    image: alfg/nginx-rtmp:latest   # nginx with nginx-rtmp-module pre-built
    restart: unless-stopped
    ports:
      - "${RTMP_PORT:-1935}:1935"   # RTMP ingest  (push stream here from your fan-out project)
      - "${HTTP_PORT:-8080}:8080"   # HTTP         (HLS stream + archive browser)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./scripts:/opt/tuberadio/scripts:ro
      - radio-hls:/var/www/radio/hls
      - radio-archive:/var/www/radio/archive
      - radio-logs:/var/log/nginx
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # api  — Node.js status & archive JSON API (proxied by nginx at /api/)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3000"
      HLS_DIR: /var/www/radio/hls
      ARCHIVE_DIR: /var/www/radio/archive
      HIDDEN_ARCHIVE_DIR: /var/www/radio/hidden_archive
      STALE_MS: "${STALE_MS:-30000}"
      HLS_STREAM_URL: "${HLS_STREAM_URL:-/hls/stream.m3u8}"
      ARCHIVE_URL_PREFIX: "${ARCHIVE_URL_PREFIX:-/archive}"
      ARCHIVE_AGE_DAYS: "${ARCHIVE_AGE_DAYS:-0}"
      HIDDEN_ARCHIVE_DELETE_DAYS: "${HIDDEN_ARCHIVE_DELETE_DAYS:-0}"
    volumes:
      - radio-hls:/var/www/radio/hls:ro
      - radio-archive:/var/www/radio/archive
      - radio-hidden-archive:/var/www/radio/hidden_archive

volumes:
  radio-hls:
  radio-archive:
  radio-hidden-archive:
  radio-logs:
