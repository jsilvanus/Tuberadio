# =============================================================================
# Tuberadio — Nginx RTMP + HTTP configuration
#
# Listens for an RTMP stream on port 1935 (application: live).
# When a publisher connects, on-publish.sh is called, which launches FFmpeg to:
#   • produce an HLS audio-only stream  →  /var/www/radio/hls/stream.m3u8
#   • archive the full transmission     →  /var/www/radio/archive/<timestamp>.mp3
#
# HTTP on port 8080 serves:
#   /hls/     — live HLS segments
#   /archive/ — archived MP3 recordings (directory listing)
#   /api/     — status / archive API  (proxied to Node.js on port 3000)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# ---------------------------------------------------------------------------
# RTMP block — receive the incoming RTMP push from the fan-out project
# ---------------------------------------------------------------------------
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout    30s;

        application live {
            live on;
            record off;

            # Drop any video track at the RTMP level so only audio reaches the
            # exec'd FFmpeg process (belt-and-suspenders; FFmpeg also uses -vn).
            drop_idle_publisher 10s;

            # Called when a publisher (e.g. the YouTube fan-out project) starts
            # streaming.  $name is the stream key, e.g. "stream".
            exec_push /opt/tuberadio/scripts/on-publish.sh $name;
        }
    }
}

# ---------------------------------------------------------------------------
# HTTP block — serve HLS, archives, and proxy to the Node.js status API
# ---------------------------------------------------------------------------
http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;

    # Logging
    access_log /var/log/nginx/access.log;

    server {
        listen      8080;
        server_name _;

        root /var/www/radio;

        # ------------------------------------------------------------------
        # HLS audio stream
        # ------------------------------------------------------------------
        location /hls/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }

            # Disable caching — HLS manifests change every few seconds
            add_header Cache-Control no-cache always;
            add_header Pragma        no-cache always;

            # Allow any origin so the embeddable widget can be served from a
            # different domain
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        }

        # ------------------------------------------------------------------
        # Archived MP3 recordings
        # ------------------------------------------------------------------
        location /archive/ {
            autoindex            on;
            autoindex_exact_size off;
            autoindex_localtime  on;

            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        }

        # ------------------------------------------------------------------
        # Status / archive JSON API — forwarded to the Node.js server.
        # In Docker Compose the upstream is the "api" service.
        # On bare metal, change this to http://127.0.0.1:3000.
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://api:3000;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # OPTIONS pre-flight for CORS
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  *;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                return 204;
            }
        }
    }
}
